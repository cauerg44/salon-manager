# MySQL Connection (Docker)
spring.datasource.url=jdbc:mysql://localhost:3308/db_docker_container?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Deixe o validate para garantir a estrutura
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.defer-datasource-initialization=true

# Logs
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true